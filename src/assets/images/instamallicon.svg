<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cart1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bg1)"/>
  
  <!-- Credit card -->
  <g transform="translate(256, 200)">
    <rect x="-100" y="-50" width="200" height="120" rx="12" fill="white" opacity="0.95" filter="url(#shadow1)"/>
    <rect x="-100" y="-50" width="200" height="30" rx="12" fill="#1F2937"/>
    <rect x="-85" y="-5" width="170" height="12" rx="3" fill="#E5E7EB"/>
    <rect x="-85" y="15" width="60" height="12" rx="3" fill="#E5E7EB"/>
    <rect x="-85" y="35" width="80" height="12" rx="3" fill="#E5E7EB"/>
    
    <!-- Card chip -->
    <rect x="50" y="-5" width="30" height="25" rx="4" fill="url(#cart1)"/>
    <rect x="53" y="-2" width="24" height="19" rx="2" fill="#F59E0B" opacity="0.6"/>
  </g>
  
  <!-- Shopping cart -->
  <g transform="translate(280, 320)">
    <path d="M -30 -40 L -20 0 L 30 0 L 35 -40 Z" fill="url(#cart1)" filter="url(#glow)"/>
    <circle cx="-10" cy="15" r="8" fill="url(#cart1)"/>
    <circle cx="20" cy="15" r="8" fill="url(#cart1)"/>
    <path d="M -35 -45 L -30 -40" stroke="url(#cart1)" stroke-width="5" stroke-linecap="round"/>
  </g>
  
  <!-- "IM" monogram -->
  <g transform="translate(180, 310)">
    <circle cx="0" cy="0" r="35" fill="white" opacity="0.25" filter="url(#shadow1)"/>
    <text x="0" y="12" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">IM</text>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="120" cy="380" r="4" fill="white" opacity="0.4"/>
  <circle cx="390" cy="140" r="6" fill="white" opacity="0.35"/>
  <circle cx="100" cy="120" r="5" fill="white" opacity="0.3"/>
  <circle cx="400" cy="370" r="7" fill="white" opacity="0.35"/>
</svg>
